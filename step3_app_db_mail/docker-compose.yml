# Compose で管理するサービス一覧を書く。
services:
  # PHP + Apache のアプリケーションコンテナ。
  app:
    # ローカルの Dockerfile から app イメージをビルドする。
    build:
      # ビルドコンテキストはこの step フォルダ全体にする。
      context: .
      # app 用 Dockerfile の場所を指定する。
      dockerfile: docker/app/Dockerfile
    # 作成される app コンテナの名前を固定する。
    container_name: docker_practice_handson_step3_app
    # ホストの src をコンテナの Apache ドキュメントルートにマウントする。
    volumes:
      # src を編集すると、コンテナ内の /var/www/html に即反映される。
      - ./src:/var/www/html
    # app コンテナ内で使う環境変数を定義する。
    environment:
      # Compose ネットワーク内では db サービス名で MySQL に接続できる。
      DB_HOST: db
      # MySQL コンテナ内の接続ポート。
      DB_PORT: 3306
      # .env の MYSQL_DATABASE を app 用の DB 名として渡す。
      DB_DATABASE: ${MYSQL_DATABASE}
      # .env の MYSQL_USER を app 用の DB ユーザーとして渡す。
      DB_USERNAME: ${MYSQL_USER}
      # .env の MYSQL_PASSWORD を app 用の DB パスワードとして渡す。
      DB_PASSWORD: ${MYSQL_PASSWORD}
      # Compose ネットワーク内では mail サービス名で Mailpit に接続できる。
      MAIL_HOST: mail
      # Mailpit の SMTP 受信用ポート。
      MAIL_PORT: 1025
      # ブラウザで Mailpit を見るためのホスト側ポート (画面表示に使う)。
      MAIL_WEB_PORT: ${MAIL_WEB_PORT}
    # ホストとコンテナのポートを対応させる。
    ports:
      # ホストの APP_PORT をコンテナの Apache 80 番に接続する。
      - "${APP_PORT}:80"
    # app は db と mail 起動後に作成される。
    depends_on:
      # db サービスへの依存を指定する。
      - db
      # mail サービスへの依存を指定する。
      - mail
    # app を app_network に参加させる。
    networks:
      # db と mail と同じネットワークに入れることでサービス名通信できる。
      - app_network

  # MySQL のデータベースコンテナ。
  db:
    # MySQL 8.4 の公式イメージを使う。
    image: mysql:8.4
    # 作成される db コンテナの名前を固定する。
    container_name: docker_practice_handson_step3_db
    # MySQL 初期化に使う環境変数を定義する。
    environment:
      # 作成するデータベース名。
      MYSQL_DATABASE: ${MYSQL_DATABASE}
      # 作成する一般ユーザー名。
      MYSQL_USER: ${MYSQL_USER}
      # 一般ユーザーのパスワード。
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
      # root ユーザーのパスワード。
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
    # MySQL のデータや初期化 SQL をマウントする。
    volumes:
      # MySQL のデータを Docker volume に保存して永続化する。
      - db_data:/var/lib/mysql
      # 初回起動時に実行する SQL を置くディレクトリ。
      - ./docker/db/init:/docker-entrypoint-initdb.d
    # ホストから MySQL に接続できるようにポートを公開する。
    ports:
      # ホストの DB_PORT をコンテナの MySQL 3306 番に接続する。
      - "${DB_PORT}:3306"
    # db を app_network に参加させる。
    networks:
      # app と mail と同じネットワークに入れる。
      - app_network

  # 開発用メール確認ツールの Mailpit コンテナ。
  mail:
    # Mailpit の公式イメージを使う。
    image: axllent/mailpit:latest
    # 作成される mail コンテナの名前を固定する。
    container_name: docker_practice_handson_step3_mail
    # Mailpit の Web UI と SMTP ポートを公開する。
    ports:
      # ホストの MAIL_WEB_PORT を Mailpit Web UI の 8025 番に接続する。
      - "${MAIL_WEB_PORT}:8025"
      # ホストの MAIL_SMTP_PORT を Mailpit SMTP の 1025 番に接続する。
      - "${MAIL_SMTP_PORT}:1025"
    # mail を app_network に参加させる。
    networks:
      # app と db と同じネットワークに入れる。
      - app_network

# Compose が管理する Docker volume を定義する。
volumes:
  # MySQL のデータ保存用 volume。
  db_data:

# Compose が管理する Docker network を定義する。
networks:
  # app、db、mail が通信するためのネットワーク。
  app_network:
    # 同一ホスト内のコンテナ間通信に使う標準的な bridge ネットワーク。
    driver: bridge
